<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Iniciar Sesión | Drippie</title>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="screen">

        <div class="auth-header">
            <div class="logo-icon">💧</div>
            <span class="logo-name">Drippie</span>
        </div>

        <div class="form-area" id="formArea">

            <h1 class="form-title" id="formTitle">Crear cuenta</h1>
            <p class="form-subtitle" id="formSubtitle">Comienza tu viaje de riego inteligente</p>

            <div class="tabs">
                <button class="tab active" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
                <button class="tab" id="tabLogin" onclick="switchTab('login')">Iniciar sesión</button>
            </div>

            <div class="panel active" id="panelRegister">
                <div class="field">
                    <label>Nombre completo</label>
                    <div class="field-wrap">
                        <input type="text" placeholder="Juan Peréz">
                        <span class="field-icon">👤</span>
                    </div>
                </div>

                <div class="field">
                    <label>Correo electrónico</label>
                    <div class="field-wrap">
                        <input type="email" placeholder="tu.correo@ejemplo.com">
                        <span class="field-icon">✉️</span>
                    </div>
                </div>

                <div class="field">
                    <label>Contraseña</label>
                    <div class="field-wrap">
                        <input type="password" id="regPass" placeholder="Crea una contraseña segura">
                        <span class="field-icon" onclick="togglePass('regPass', this)">👁️</span>
                    </div>
                </div>

                <p class="terms">
                    Al crear una cuenta, aceptas nuestros
                    <a href="#">Términos de Servicio</a> y
                    <a href="#">Política de Privacidad</a>
                </p>

                <button class="btn-primary">Crear cuenta</button>

                <!--
                <div class="divider"><span>o continúa con</span></div>

                <button class="btn-google">
                    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continuar con Google
                </button> -->

                <p class="switch-link">
                    ¿Ya tienes cuenta?
                    <button onclick="switchTab('login')">Inicia sesión</button>
                </p>
            </div>

            <div class="panel" id="panelLogin">
                <div class="field">
                    <label>Correo electrónico</label>
                    <div class="field-wrap">
                        <input type="email" placeholder="tu.correo@ejemplo.com" id="email">
                        <span class="field-icon">✉️</span>
                    </div>
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <div class="field-wrap">
                        <input type="password" id="loginPass" placeholder="Tu contraseña">
                        <span class="field-icon" onclick="togglePass('loginPass', this)">👁️</span>
                    </div>
                </div>

                <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>

                <button class="btn-primary" onclick="login()">Iniciar sesión</button>

                <p class="switch-link">
                    ¿No tienes cuenta?
                    <button onclick="switchTab('register')">Regístrate</button>
                </p>
            </div>

        </div>
    </div>

<script>
    function switchTab(tab) {
        const isRegister = tab === 'register';

        document.getElementById('tabRegister').classList.toggle('active', isRegister);
        document.getElementById('tabLogin').classList.toggle('active', !isRegister);

        document.getElementById('panelRegister').classList.toggle('active', isRegister);
        document.getElementById('panelLogin').classList.toggle('active', !isRegister);

        document.getElementById('formTitle').textContent    = isRegister ? 'Crear cuenta' : 'Bienvenido de nuevo';
        document.getElementById('formSubtitle').textContent = isRegister
            ? 'Comienza tu viaje de riego inteligente'
            : 'Accede a tus cultivos y estadísticas';

        const fa = document.getElementById('formArea');
        fa.style.animation = 'none';
        fa.offsetHeight;
        fa.style.animation = '';
    }

    function togglePass(inputId, icon) {
        const input = document.getElementById(inputId);
        const isPass = input.type === 'password';
        input.type = isPass ? 'text' : 'password';
        icon.style.opacity = isPass ? '0.7' : '0.25';
    }

    function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("loginPass").value;

    // USUARIO DE PRUEBAAAAAAAAA
    //
    //
    //
    //
    //
    const validEmail = "com";
    const validPassword = "123";

    if(email === validEmail && password === validPassword) {
        window.location.href = "/dashboard/dashboard.html";
    } else {
        alert("Correo o contraseña incorrectos");
    }
}
</script>
</body>
</html>
