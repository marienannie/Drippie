<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style/jardines.css">
<title>Drippie – Mis Jardines</title>
</head>
<body>
<div class="bg-mesh"></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
<aside class="sidebar" id="sidebar">
    <div class="logo">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24"><path d="M12 2C12 2 5 10 5 15a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
        </div>
        <span class="logo-name">Drippie</span>
    </div>

    <span class="nav-lbl">Principal</span>
    <button class="nav-item" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
    </button>
    <button class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
        Mis Jardines
    </button>
    <button class="nav-item" onclick="window.location.href='alertas.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        Alertas <span class="nav-pip"></span>
    </button>
    <button class="nav-item" onclick="window.location.href='estadisticas.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Estadísticas
    </button>
    <span class="nav-lbl">Sistema</span>
    <button class="nav-item" onclick="window.location.href='dispositivos.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3l-4 4-4-4"/></svg>
        Dispositivos
    </button>
    <button class="nav-item" onclick="window.location.href='configuracion.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Configuración
    </button>
    <div class="sidebar-foot">
        <div class="user-row">
            <div class="avatar">JD</div>
            <div class="user-meta"><div class="u-name">Juan Pérez</div></div>
            <span style="font-size:13px;color:var(--t3);">···</span>
        </div>
    </div>
</aside>

<div class="main">
    <header class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
        <div class="tb-left">
            <div class="tb-eyebrow" id="topDate"></div>
            <div class="tb-title" id="topGreet"></div>
        </div>
        <div class="tb-right">
            <div class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                <div class="n-pip"></div>
            </div>
            <div class="icon-btn" style="background:var(--as);border-color:var(--ab);font-size:11px;font-weight:800;color:var(--accent);">JD</div>
        </div>
    </header>

    <div class="content">

        <!-- HEADER -->
        <div class="jardines-header">
            <div class="jardines-header-left">
                <h2>Mis Jardines</h2>
                <p id="jardines-count">3 jardines activos · última actualización hace 2 min</p>
            </div>
            <button class="btn-add">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Nuevo jardín
            </button>
        </div>

        
    </div>
</div>
</div>

<nav class="bottom-nav">
    <div class="bnav">
        <button class="bi" onclick="window.location.href='dashboard.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Inicio
        </button>
        <button class="bi active">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
            Jardines
        </button>
        <button class="bi" style="position:relative;" onclick="window.location.href='alertas.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="b-pip"></span>
            Alertas
        </button>
        <button class="bi">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Perfil
        </button>
    </div>
</nav>

<script src="script.js"></script>
<script src="script/jardines.js"></script>
</body>
</html>
